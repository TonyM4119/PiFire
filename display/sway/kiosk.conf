# PiFire sway kiosk configuration.
#
# Runs a single fullscreen Qt client (display_process.py) with no window
# decorations. The client requests fullscreen itself (qtapp.run_app calls
# showFullScreen), so this config only strips borders and chrome.
#
# Why sway instead of cage: sway does real DPMS (`swaymsg output * dpms off/on`,
# driven by the app's cook-aware idle machine). Unlike cage's `wlr-randr --off`,
# DPMS leaves the output enabled and mapped, so a touch still routes to the app
# and wakes the screen -- on both DSI and HDMI panels.
#
# Lifetime: `exec` launches the display process; when it exits, `swaymsg exit`
# brings sway down so supervisor restarts the whole stack (matches cage's
# exit-with-child behavior). PIFIRE_DISPLAY_CMD is set by display_launch.py.

# No status bar is configured, so none is shown.
default_border none
default_floating_border none

# Qt talks Wayland natively; no need to spin up XWayland.
xwayland disable

# Touch-only kiosk: hide the pointer when idle.
seat * hide_cursor 8000

exec sh -c 'eval "$PIFIRE_DISPLAY_CMD"; swaymsg exit'
