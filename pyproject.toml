readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "apprise>=1.11.0",
    "bleak>=3.0.2",
    "bluepy>=1.3.0",
    "flask>=3.1.3",
    "flask-mobility>=2.0.1",
    "flask-qrcode>=3.2.0",
